<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музыкальная Образовательная Школа</title>
	<link rel="stylesheet" href="css/style_contact.css">
	<script src="js/script.js"></script>
</head>

<body>
    <header>
        <nav>
			<div class="menu-container">
			<button id="theme-button">
				<img src='img/moon-icon.png' alt='turn on dark theme'>
			</button>
			<button class="menu-button" id="menu-button">☰</button>
                <div class="menu" id="menu">
                    <a href="index.html">Главная</a>
                    <a href="about.html">О нас</a>
                    <a href="contact.html">Контакты</a>
                </div>
			</div>
        </nav>
    </header>

    <main>
        <section class="contact">
            <form>
                <h1>Связаться с нами</h1>
                <div>
                  <input type="text" placeholder="Введите имя" required>
                </div>
                <div>
                  <input type="email" placeholder="Введите адрес электронной почты" required>
                </div>
                <div>
                  <textarea placeholder="Введите сообщение" rows="4" cols="50" required></textarea>
                </div>
                <button class="submit">Отправить</button>
            </form>
            <img src="img/contact.jpg" alt="man pointing at form">
        </section>
            
        <section class="info">
            <div>
                <h2>Позвоните нам</h2>
                <p>1 (234) 567-891, 1 (234) 987-654</p>
            </div>
            <div>
                <h2>Расположение</h2>
                <p>г. Москва, ул. Пушкина, д. 1А</p>
            </div>
            <div>
                <h2>Часы работы</h2>
                <p>Пн – Пт 10:00 – 20:00</p>
            </div>
        </section>
    </main>

</body>
</html>
